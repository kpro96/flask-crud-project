<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Item</title>
</head>
<body>
    <h2>Update Item Name</h2>
    <form action="/update/{{item.id}}"  method="POST">
        <input type="text" name="content" id="content" value="{{item.name}}">
        <input type="submit" value="Update">
    </form>
    <br>
    <a href="/">Cancel and go back</a>
</body>
</html>
